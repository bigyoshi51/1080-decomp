name: 1080 Snowboarding (USA)
sha1: 79cd1166c365e5809dec9b62e6d40d6032d5db3a
options:
  basename: tenshoe
  target_path: baserom.z64
  base_path: .
  platform: n64
  compiler: GCC

  ld_align_section_vram_end: False
  ld_align_segment_vram_end: False
  subalign: null

  section_order: [".text", ".rodata", ".data", ".bss"]

  symbol_addrs_path: symbol_addrs.txt
  undefined_syms_auto_path: undefined_syms_auto.txt
  undefined_funcs_auto_path: undefined_funcs_auto.txt

  asm_path: asm
  src_path: src
  build_path: build
  asset_path: assets

  find_file_boundaries: False
  use_legacy_include_asm: False

segments:
  - [0x0, bin, header]
  - [0x40, bin, ipl3]

  - name: kernel
    type: code
    start: 0x1000
    vram: 0x80000000
    subsegments:
      - [0x1000, c, kernel]
      - [0xAE60, .rodata, kernel]
      - [0xAFD0, .data, kernel]

  # USO overlays. Each USO is a self-contained, relocatable overlay loaded
  # at runtime. Progress tracking is NOT yet wired up — these are raw bin
  # segments until a USO linker exists to rebuild them from C source.
  # Offsets come from uso_extract/manifest.json. The 0xBBC0 boundary cuts
  # into audio_bank.uso (its true start is 0xB810); the first 0x3B0 bytes
  # live in kernel.data. Left as-is to avoid disturbing the matching kernel.
  - [0xBBC0, bin, audio_bank_uso_tail]
  - [0x1E940, bin, audio_seq_uso]
  - [0x3F270, bin, audio_wave_uso]
  - [0x53E120, bin, tahoe151_uso]
  - [0x542540, bin, merlot147_uso]
  - [0x546960, bin, blin149_uso]
  - [0x54AD80, bin, scout156_uso]
  - [0x54F1A0, bin, tahoe155_uso]
  - [0x5535C0, bin, scoutltd162_uso]
  - [0x5579E0, bin, merlot143_uso]
  - [0x55BE00, bin, blin154_uso]
  - [0x560220, bin, penguin_uso]
  - [0x561C1C, bin, boarder1_uso]
  - [0x56AEA8, bin, boarder2_uso]
  - [0x5726FC, bin, boarder3_uso]
  - [0x57AE94, bin, boarder4_uso]
  - [0x584160, bin, boarder5_uso]
  - [0x58D484, bin, gui_uso]
  - [0x5926B4, bin, n64proc_uso]
  - [0x5953E0, bin, titproc_uso]
  - [0x59F1F4, bin, eddproc_uso]
  - [0x5A015C, bin, mgrproc_uso]
  - [0x5A5BE0, bin, arcproc_uso]
  - [0x5AB208, bin, h2hproc_uso]
  - [0x5AF0EC, bin, timproc_uso]
  - [0x6E466C, bin, map4_data_uso]
  - [0x7CC8D8, bin, game_uso]
  - [0x84F6F8, bin, bg3tex_uso]
  - [0x8A8E60, bin, bg6tex_uso]
  - [0x8BF7B8, bin, bg7tex_uso]
  - [0x8DC8DC, bin, bg8tex_uso]
  - [0x9209B8, bin, player_data]
  - [0xD9FDB0, bin, rom_fs]
  # bootup_uso split into three: pre-text USO metadata/data/rodata/relocs,
  # text code (302 funcs, disassembled at VRAM=0 since LUIs are unrelocated
  # with upper16=0x0000), and post-text padding. The text VRAM=0 is a
  # synthetic address — this code actually gets loaded to a dynamic VRAM
  # at runtime by the USO loader; we match pre-relocation text bytes.
  - [0xD9FE28, bin, bootup_uso_pre]
  - name: bootup_uso
    type: code
    start: 0xDD0A6C
    vram: 0x00000000
    subsegments:
      - [0xDD0A6C, c, bootup_uso]
  - [0xDE50B8, bin, bootup_uso_post]
  # game_libs: 468 KB of raw relocatable text (1371 functions) followed by
  # ~11 KB of data tables. Same decomp pattern as bootup_uso: VRAM=0,
  # external symbol defs, per-.o matching.
  - [0xDE50D4, bin, game_libs_pre]
  - name: game_libs
    type: code
    start: 0xDE50D8
    vram: 0x00000000
    subsegments:
      - [0xDE50D8, c, game_libs/game_libs]
  - [0xE5A378, bin, game_libs_post]
  - [0xE5D0D4, bin, game_data]
  - [0x1000000]
