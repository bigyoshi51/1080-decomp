name: 1080 Snowboarding (USA)
sha1: 79cd1166c365e5809dec9b62e6d40d6032d5db3a
options:
  basename: tenshoe
  target_path: baserom.z64
  base_path: .
  platform: n64
  compiler: GCC

  ld_align_section_vram_end: False
  ld_align_segment_vram_end: False
  subalign: null

  section_order: [".text", ".rodata", ".data", ".bss"]

  symbol_addrs_path: symbol_addrs.txt
  undefined_syms_auto_path: undefined_syms_auto.txt
  undefined_funcs_auto_path: undefined_funcs_auto.txt

  asm_path: asm
  src_path: src
  build_path: build
  asset_path: assets

  find_file_boundaries: False
  use_legacy_include_asm: False

  # Match the existing bootup_uso/game_libs asm format (no .set noat header,
  # `nonmatching SIZE` instead of size directive).
  asm_inc_header: ""
  asm_nonmatching_label_macro: "nonmatching"
  asm_emit_size_directive: False

segments:
  - [0x0, bin, header]
  - [0x40, bin, ipl3]

  - name: kernel
    type: code
    start: 0x1000
    vram: 0x80000000
    subsegments:
      - [0x1000, c, kernel]
      - [0xAE60, .rodata, kernel]
      - [0xAFD0, .data, kernel]

  # USO overlays. Each USO is a self-contained, relocatable overlay loaded
  # at runtime. Progress tracking is NOT yet wired up — these are raw bin
  # segments until a USO linker exists to rebuild them from C source.
  # Offsets come from uso_extract/manifest.json. The 0xBBC0 boundary cuts
  # into audio_bank.uso (its true start is 0xB810); the first 0x3B0 bytes
  # live in kernel.data. Left as-is to avoid disturbing the matching kernel.
  - [0xBBC0, bin, audio_bank_uso_tail]
  - [0x1E940, bin, audio_seq_uso]
  - [0x3F270, bin, audio_wave_uso]
  - [0x53E120, bin, tahoe151_uso]
  - [0x542540, bin, merlot147_uso]
  - [0x546960, bin, blin149_uso]
  - [0x54AD80, bin, scout156_uso]
  - [0x54F1A0, bin, tahoe155_uso]
  - [0x5535C0, bin, scoutltd162_uso]
  - [0x5579E0, bin, merlot143_uso]
  - [0x55BE00, bin, blin154_uso]
  - [0x560220, bin, penguin_uso]
  - [0x561C1C, bin, boarder1_uso_pre]
  - name: boarder1_uso
    type: code
    start: 0x56A750
    vram: 0x00000000
    subsegments:
      - [0x56A750, c, boarder1_uso/boarder1_uso]
  - [0x56A8F0, bin, boarder1_uso_post]
  - [0x56AEA8, bin, boarder2_uso_pre]
  - name: boarder2_uso
    type: code
    start: 0x571FBC
    vram: 0x00000000
    subsegments:
      - [0x571FBC, c, boarder2_uso/boarder2_uso]
  - [0x572150, bin, boarder2_uso_post]
  - [0x5726FC, bin, boarder3_uso_pre]
  - name: boarder3_uso
    type: code
    start: 0x57A790
    vram: 0x00000000
    subsegments:
      - [0x57A790, c, boarder3_uso/boarder3_uso]
  - [0x57A930, bin, boarder3_uso_post]
  - [0x57AE94, bin, boarder4_uso_pre]
  - name: boarder4_uso
    type: code
    start: 0x5839D8
    vram: 0x00000000
    subsegments:
      - [0x5839D8, c, boarder4_uso/boarder4_uso]
  - [0x583B70, bin, boarder4_uso_post]
  - [0x584160, bin, boarder5_uso_pre]
  - name: boarder5_uso
    type: code
    start: 0x58CC50
    vram: 0x00000000
    subsegments:
      - [0x58CC50, c, boarder5_uso/boarder5_uso]
  - [0x58CDF0, bin, boarder5_uso_post]
  # gui_uso: 21 KB code-bearing USO. Same VRAM=0 pattern as bootup_uso/game_libs.
  # Header at 0x58D484 (filesystem entry, magic 0x12345678 + name "gui.uso").
  # Inner USO data magic at 0x58D4AC. Text section starts at 0x58D530 with size
  # 0x4880 (per inline section header).
  - [0x58D484, bin, gui_uso_pre]
  - name: gui_uso
    type: code
    start: 0x58D530
    vram: 0x00000000
    symbol_name_format: gui_$VRAM
    subsegments:
      - [0x58D530, c, gui_uso/gui_uso]
  - [0x591DB0, bin, gui_uso_post]
  - [0x5926B4, bin, n64proc_uso_pre]
  - name: n64proc_uso
    type: code
    start: 0x594A54
    vram: 0x00000000
    subsegments:
      - [0x594A54, c, n64proc_uso/n64proc_uso]
  - [0x594E84, bin, n64proc_uso_post]
  - [0x5953E0, bin, titproc_uso_pre]
  - name: titproc_uso
    type: code
    start: 0x599CCC
    vram: 0x00000000
    subsegments:
      - [0x599CCC, c, titproc_uso/titproc_uso]
  - [0x59C6FC, bin, titproc_uso_post]
  - [0x59F1F4, bin, eddproc_uso_pre]
  - name: eddproc_uso
    type: code
    start: 0x59F480
    vram: 0x00000000
    subsegments:
      - [0x59F480, c, eddproc_uso/eddproc_uso]
  - [0x59F900, bin, eddproc_uso_post]
  # mgrproc_uso: Yay0-compressed USO. 2 Yay0 blocks; block 0 is bss-zeros (passthrough),
  # block 1 is the actual text (50 functions, 0x3420 uncompressed). Block 1 is built
  # from C and re-compressed at link time via crunch64; other slices passthrough.
  - [0x5A015C, bin, mgrproc_uso_pre]
  - [0x5A07CC, bin, mgrproc_uso_block0_yay0]
  - [0x5A0A49, bin, mgrproc_uso_inter]
  - [0x5A0A56, bin, mgrproc_uso_block1_yay0]
  - [0x5A2927, bin, mgrproc_uso_post]
  - [0x5A5BE0, bin, arcproc_uso_pre]
  - name: arcproc_uso
    type: code
    start: 0x5A6148
    vram: 0x00000000
    subsegments:
      - [0x5A6148, c, arcproc_uso/arcproc_uso]
  - [0x5A8AC8, bin, arcproc_uso_post]
  - [0x5AB208, bin, h2hproc_uso_pre]
  - name: h2hproc_uso
    type: code
    start: 0x5AB6B0
    vram: 0x00000000
    subsegments:
      - [0x5AB6B0, c, h2hproc_uso/h2hproc_uso]
  - [0x5AD1E0, bin, h2hproc_uso_post]
  - [0x5AF0EC, bin, timproc_uso]
  - [0x6E466C, bin, map4_data_uso]
  - [0x7CC8D8, bin, game_uso]
  - [0x84F6F8, bin, bg3tex_uso]
  - [0x8A8E60, bin, bg6tex_uso]
  - [0x8BF7B8, bin, bg7tex_uso]
  - [0x8DC8DC, bin, bg8tex_uso]
  - [0x9209B8, bin, player_data]
  - [0xD9FDB0, bin, rom_fs]
  # bootup_uso split into three: pre-text USO metadata/data/rodata/relocs,
  # text code (302 funcs, disassembled at VRAM=0 since LUIs are unrelocated
  # with upper16=0x0000), and post-text padding. The text VRAM=0 is a
  # synthetic address — this code actually gets loaded to a dynamic VRAM
  # at runtime by the USO loader; we match pre-relocation text bytes.
  - [0xD9FE28, bin, bootup_uso_pre]
  - name: bootup_uso
    type: code
    start: 0xDD0A6C
    vram: 0x00000000
    subsegments:
      - [0xDD0A6C, c, bootup_uso]
  - [0xDE50B8, bin, bootup_uso_post]
  # game_libs: 468 KB of raw relocatable text (1371 functions) followed by
  # ~11 KB of data tables. Same decomp pattern as bootup_uso: VRAM=0,
  # external symbol defs, per-.o matching.
  - [0xDE50D4, bin, game_libs_pre]
  - name: game_libs
    type: code
    start: 0xDE50D8
    vram: 0x00000000
    subsegments:
      - [0xDE50D8, c, game_libs/game_libs]
  - [0xE5A378, bin, game_libs_post]
  - [0xE5D0D4, bin, game_data]
  - [0x1000000]
