name: Build & Report

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cross-assembler/linker
        run: sudo apt-get update && sudo apt-get install -y binutils-mips-linux-gnu

      - name: Download prebuilt IDO 7.1
        run: |
          mkdir -p tools/ido-static-recomp/build/7.1/out
          curl -sL https://github.com/decompals/ido-static-recomp/releases/download/v1.2/ido-7.1-recomp-linux.tar.gz \
            | tar xz -C tools/ido-static-recomp/build/7.1/out
          chmod +x tools/ido-static-recomp/build/7.1/out/*

      - name: Build C objects (no baserom required)
        run: make RUN_CC_CHECK=0 -j$(nproc) objects

      - name: Generate progress report
        run: |
          curl -sL https://github.com/encounter/objdiff/releases/latest/download/objdiff-cli-linux-x86_64 -o objdiff-cli
          chmod +x objdiff-cli
          ./objdiff-cli report generate -p . -o report.json

      - name: Upload progress report
        uses: actions/upload-artifact@v4
        with:
          name: us_report
          path: report.json
